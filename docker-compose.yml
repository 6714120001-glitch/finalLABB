version: '3.8'

services:
  db:
    image: mongo:latest
    ports:
      - "27017:27017"
    restart: always

  backend:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://db:27017/bugbounty
      - JWT_SECRET=super_secure_secret_2025
    depends_on:
      - db
    restart: always

  frontend:
    build: ./client
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: always